name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to Firebase Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Create .env.production from secrets
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.PROD_FIREBASE_API_KEY }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.PROD_FIREBASE_PROJECT_ID }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.PROD_FIREBASE_APP_ID }}" >> .env.production

      - name: Create functions/.env from secrets
        run: |
          echo "FOOTBALL_API_KEY=${{ secrets.PROD_FOOTBALL_API_KEY }}" > functions/.env

      - name: Verify Firebase env file (values not logged)
        run: |
          set -euo pipefail
          ENV_FILE=".env.production"
          required=(
            NEXT_PUBLIC_FIREBASE_API_KEY
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
            NEXT_PUBLIC_FIREBASE_PROJECT_ID
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
            NEXT_PUBLIC_FIREBASE_APP_ID
          )
          for var in "${required[@]}"; do
            line=$(grep -E "^${var}=" "$ENV_FILE" || true)
            if [[ -z "$line" ]]; then
              echo "::error::Missing $var in $ENV_FILE"
              exit 1
            fi
            val="${line#*=}"
            val="${val%$'\r'}"
            if [[ -z "$val" ]]; then
              echo "::error::Empty $var — check repository secrets PROD_FIREBASE_* in GitHub Actions"
              exit 1
            fi
            echo "OK: $var is set (length ${#val})"
          done
          api_line=$(grep -E "^NEXT_PUBLIC_FIREBASE_API_KEY=" "$ENV_FILE")
          api_val="${api_line#*=}"
          api_val="${api_val%$'\r'}"
          if [[ ${#api_val} -lt 35 ]] || [[ "$api_val" != AIzaSy* ]]; then
            echo "::error::NEXT_PUBLIC_FIREBASE_API_KEY looks invalid (length ${#api_val}, expected ~39 and prefix AIzaSy). Update GitHub secret PROD_FIREBASE_API_KEY with the Web API key from Firebase Console → Project settings → Your apps → SDK setup."
            exit 1
          fi
          echo "All NEXT_PUBLIC_FIREBASE_* keys are present and non-empty in $ENV_FILE"

      - name: Build (production)
        run: npm run build:prod

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify FIREBASE_TOKEN (value not logged)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$FIREBASE_TOKEN" ]]; then
            echo "::error::FIREBASE_TOKEN secret is missing or empty"
            exit 1
          fi
          echo "OK: FIREBASE_TOKEN is set (length ${#FIREBASE_TOKEN})"

      - name: Deploy to Firebase Production
        run: firebase deploy --project production --token "${{ secrets.FIREBASE_TOKEN }}"
